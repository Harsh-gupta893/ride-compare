<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - CabCompare</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">
  <div class="auth-bg">
    <img src="assets/hero-banner.jpg" alt="" class="auth-bg__image" />
    <div class="auth-bg__overlay"></div>
  </div>

  <div class="auth-card">
    <div class="auth-card__header">
      <div class="auth-card__logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="hsl(220 20% 7%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 17h2a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z"/>
          <path d="M17 17h2a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2z"/>
          <path d="M3 21h18"/>
        </svg>
      </div>
      <h1 class="auth-card__title">Cab<span class="auth-card__title--highlight">Compare</span></h1>
      <p class="auth-card__subtitle">Find the best ride, every time</p>
    </div>

    <div class="auth-card__body">
      <h2 class="auth-card__heading">Welcome back</h2>
      <div id="error" class="alert alert--danger" style="display:none;"></div>
      <form id="loginForm" class="form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="email" type="email" placeholder="you@example.com" class="input" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="password" type="password" placeholder="••••••••" class="input" />
        </div>
        <button type="submit" class="button button--primary button--large">Log in</button>
      </form>
      <p class="auth-card__footer">
        Don't have an account? <a href="signup.html" class="link">Sign up</a>
      </p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    window.CabCompare.initLogin();
  </script>
</body>
</html>
